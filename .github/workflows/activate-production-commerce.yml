name: Activate Production Examination Commerce

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type ACTIVATE after all Phase 5 acceptance tests pass
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: production-commerce-activation
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate activation confirmation
        shell: bash
        run: |
          if [ "${{ inputs.confirmation }}" != "ACTIVATE" ]; then
            echo 'Production activation stopped. Enter ACTIVATE only after Phase 5 acceptance testing passes.'
            exit 1
          fi

      - name: Checkout integration branch
        uses: actions/checkout@v6
        with:
          ref: supabase-integration

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate TypeScript
        run: npm run lint

      - name: Build production portal
        run: npx vite build

      - name: Scan source tree for committed payment secrets
        shell: bash
        run: |
          if grep -RIE --exclude-dir=node_modules --exclude-dir=.git --exclude='*.md' \
            'sk_(test|live)_[A-Za-z0-9]+|sbp_[A-Za-z0-9_-]+' .; then
            echo 'A secret-shaped credential was found in the repository.'
            exit 1
          fi

      - name: Validate compiled production bundle
        run: node scripts/phase5-readiness.mjs

      - name: Upload validated Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy-functions:
    runs-on: ubuntu-latest
    needs: validate
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: cfecicvugfrrhcvhduzc
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v6
        with:
          ref: supabase-integration

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate Supabase deployment secret
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo 'SUPABASE_ACCESS_TOKEN repository secret is not configured.'
            exit 1
          fi

      - name: Deploy Paystack Edge Functions
        run: |
          npx --yes supabase@latest functions deploy initialize-exam-payment --project-ref "$SUPABASE_PROJECT_REF"
          npx --yes supabase@latest functions deploy verify-exam-payment --project-ref "$SUPABASE_PROJECT_REF"
          npx --yes supabase@latest functions deploy paystack-webhook --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt

  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - validate
      - deploy-functions
    steps:
      - name: Deploy validated GitHub Pages portal
        id: deployment
        uses: actions/deploy-pages@v4
