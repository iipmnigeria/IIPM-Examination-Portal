name: Validate AgileCert Certificate Commerce

on:
  push:
    branches:
      - certificate-commerce-v2
    paths:
      - 'src/**'
      - 'supabase/**'
      - 'deno.json'
      - 'package.json'
      - 'vite.config.*'
      - 'server.ts'
      - '.github/workflows/validate-certificate-commerce-v2.yml'
  pull_request:
    branches:
      - supabase-integration
    paths:
      - 'src/**'
      - 'supabase/**'
      - 'deno.json'
      - 'package.json'
      - 'vite.config.*'
      - 'server.ts'
      - '.github/workflows/validate-certificate-commerce-v2.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-certificate-commerce-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend TypeScript and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout protected development branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: TypeScript validation
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Verify browser build output
        shell: bash
        run: |
          test -s dist/index.html
          grep -q 'root' dist/index.html

  edge-functions:
    name: Supabase Edge Function checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout protected development branch
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Edge Function checks and capture diagnostics
        shell: bash
        run: |
          mkdir -p deno-check-logs
          status=0

          check_file() {
            name="$1"
            path="$2"
            echo "Checking ${path}"
            if deno check "${path}" > "deno-check-logs/${name}.log" 2>&1; then
              echo "PASS ${path}"
            else
              echo "FAIL ${path}"
              status=1
            fi
          }

          check_file agilecert-paystack supabase/functions/_shared/agilecertPaystack.ts
          check_file credential-assets supabase/functions/_shared/credentialAssets.ts
          check_file agilecert-email supabase/functions/_shared/agilecertEmail.ts
          check_file certificate-payment-initialize supabase/functions/initialize-certificate-payment/index.ts
          check_file certificate-payment-verify supabase/functions/verify-certificate-payment/index.ts
          check_file certificate-payment-webhook supabase/functions/paystack-certificate-webhook/index.ts
          check_file study-material-download supabase/functions/download-study-material/index.ts
          check_file credential-asset-download supabase/functions/download-credential-asset/index.ts
          check_file automation-worker supabase/functions/process-agilecert-automation/index.ts
          check_file resend-webhook supabase/functions/resend-email-webhook/index.ts

          echo "${status}" > deno-check-logs/exit-code.txt

      - name: Upload Deno diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agilecert-deno-check-logs
          path: deno-check-logs
          if-no-files-found: error
          retention-days: 7

      - name: Fail when an Edge Function check failed
        shell: bash
        run: |
          test "$(cat deno-check-logs/exit-code.txt)" = "0"
