name: Validate AgileCert Certificate Commerce

on:
  push:
    branches:
      - certificate-commerce-v2
    paths:
      - 'src/**'
      - 'supabase/**'
      - 'package.json'
      - 'vite.config.*'
      - 'server.ts'
      - '.github/workflows/validate-certificate-commerce-v2.yml'
  pull_request:
    branches:
      - supabase-integration
    paths:
      - 'src/**'
      - 'supabase/**'
      - 'package.json'
      - 'vite.config.*'
      - 'server.ts'
      - '.github/workflows/validate-certificate-commerce-v2.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-certificate-commerce-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend TypeScript and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout protected development branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: TypeScript validation
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Verify browser build output
        shell: bash
        run: |
          test -s dist/index.html
          grep -q 'root' dist/index.html

  edge-functions:
    name: Supabase Edge Function checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout protected development branch
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check AgileCert Paystack helper
        run: deno check supabase/functions/_shared/agilecertPaystack.ts

      - name: Check credential asset generator
        run: deno check supabase/functions/_shared/credentialAssets.ts

      - name: Check certificate payment initialization
        run: deno check supabase/functions/initialize-certificate-payment/index.ts

      - name: Check certificate payment verification
        run: deno check supabase/functions/verify-certificate-payment/index.ts

      - name: Check certificate payment webhook
        run: deno check supabase/functions/paystack-certificate-webhook/index.ts

      - name: Check study-material download
        run: deno check supabase/functions/download-study-material/index.ts

      - name: Check credential asset download
        run: deno check supabase/functions/download-credential-asset/index.ts
