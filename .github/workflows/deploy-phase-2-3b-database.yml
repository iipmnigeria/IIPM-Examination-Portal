# One-purpose production deployment for the approved Phase 2.3B migration.
name: Deploy Phase 2.3B Material Administration Database

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'deployment-triggers/phase-2-3b-database.txt'

permissions:
  contents: read

concurrency:
  group: phase-2-3b-database-production
  cancel-in-progress: false

jobs:
  deploy-material-administration:
    name: Apply administrator material publication tools
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: cfecicvugfrrhcvhduzc
      APPROVED_APP_COMMIT: 'f3d6caae56e4a4ba9e0563a8549764d84dcc7f87'
      PROFILE_VERSION: '202607230101'
      PHOTO_VERSION: '202607230102'
      ENTITLEMENT_VERSION: '202607240101'
      MIGRATION_VERSION: '202607240102'
      PROFILE_FILE: supabase/migrations/202607230101_phase_2_candidate_profile_foundation.sql
      PHOTO_FILE: supabase/migrations/202607230102_phase_2_candidate_profile_photo.sql
      ENTITLEMENT_FILE: supabase/migrations/202607240101_phase_2_3a_preparation_material_entitlements.sql
      MIGRATION_FILE: supabase/migrations/202607240102_phase_2_3b_material_admin_tools.sql
      SUPABASE_WORKDIR: /tmp/agilecert-phase-2-3b

    steps:
      - name: Checkout approved production branch
        uses: actions/checkout@v4
        with:
          ref: supabase-integration
          fetch-depth: 0

      - name: Validate production deployment inputs
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$(git rev-parse HEAD)" = "$APPROVED_APP_COMMIT"
          test -s "$PROFILE_FILE"
          test -s "$PHOTO_FILE"
          test -s "$ENTITLEMENT_FILE"
          test -s "$MIGRATION_FILE"
          test "$MIGRATION_VERSION" = '202607240102'
          grep -q 'get_agilecert_material_admin_console' "$MIGRATION_FILE"
          grep -q 'set_agilecert_material_version_status' "$MIGRATION_FILE"
          grep -q 'reconcile_agilecert_material_entitlements' "$MIGRATION_FILE"
          if grep -Eqi 'create[[:space:]]+or[[:space:]]+replace[[:space:]]+function[[:space:]]+public\.(initialize|verify).*payment' "$MIGRATION_FILE"; then
            echo 'The approved migration must not replace payment authority.'
            exit 1
          fi

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Prepare isolated Phase 2 migration-history workspace
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$SUPABASE_WORKDIR"
          mkdir -p "$SUPABASE_WORKDIR/supabase/migrations"
          cp supabase/config.toml "$SUPABASE_WORKDIR/supabase/config.toml"
          cp "$PROFILE_FILE" "$SUPABASE_WORKDIR/supabase/migrations/"
          cp "$PHOTO_FILE" "$SUPABASE_WORKDIR/supabase/migrations/"
          cp "$ENTITLEMENT_FILE" "$SUPABASE_WORKDIR/supabase/migrations/"
          cp "$MIGRATION_FILE" "$SUPABASE_WORKDIR/supabase/migrations/"
          test "$(find "$SUPABASE_WORKDIR/supabase/migrations" -maxdepth 1 -type f | wc -l)" -eq 4

      - name: Link isolated workspace to production Supabase
        shell: bash
        working-directory: /tmp/agilecert-phase-2-3b
        run: |
          npx --yes supabase@latest link \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Preview and apply exactly Phase 2.3B
        shell: bash
        working-directory: /tmp/agilecert-phase-2-3b
        run: |
          set +e
          dry_run_output="$(npx --yes supabase@latest db push --linked --password "$SUPABASE_DB_PASSWORD" --dry-run 2>&1)"
          dry_run_status=$?
          set -e
          printf '%s\n' "$dry_run_output" | tee "$RUNNER_TEMP/phase-2-3b-dry-run.log"

          if [ "$dry_run_status" -ne 0 ]; then
            echo "Supabase dry run exited with status $dry_run_status. No migration was applied."
            exit "$dry_run_status"
          fi

          if printf '%s\n' "$dry_run_output" | grep -Eqi 'up to date|no pending migrations'; then
            echo 'Phase 2.3B migration is already applied; no database change is required.'
          else
            pending_versions="$(printf '%s\n' "$dry_run_output" | grep -Eo '20[0-9]{10,12}' | sort -u || true)"
            echo 'Pending migration versions detected:'
            printf '%s\n' "$pending_versions"
            test "$pending_versions" = "$MIGRATION_VERSION"
            printf 'Y\n' | npx --yes supabase@latest db push --linked --password "$SUPABASE_DB_PASSWORD"
          fi

      - name: Verify remote migration history
        shell: bash
        working-directory: /tmp/agilecert-phase-2-3b
        run: |
          history_file="$RUNNER_TEMP/phase-2-3b-migration-history.log"
          npx --yes supabase@latest migration list \
            --linked \
            --password "$SUPABASE_DB_PASSWORD" 2>&1 | tee "$history_file"

          python - "$history_file" "$PROFILE_VERSION" "$PHOTO_VERSION" "$ENTITLEMENT_VERSION" "$MIGRATION_VERSION" <<'PY'
          from pathlib import Path
          import sys

          history = Path(sys.argv[1]).read_text()
          required = sys.argv[2:]
          rows = []
          for line in history.splitlines():
              if '|' not in line:
                  continue
              parts = [part.strip().strip('`') for part in line.split('|')]
              if len(parts) >= 3:
                  rows.append(parts)

          for version in required:
              matched = [row for row in rows if row[0] == version or row[1] == version]
              if not matched:
                  raise SystemExit(f'Migration {version} is missing from history.')
              if not any(row[0] == version and row[1] == version for row in matched):
                  raise SystemExit(f'Migration {version} is not recorded both locally and remotely: {matched}')
          PY

      - name: Verify deployed administration schema
        shell: bash
        working-directory: /tmp/agilecert-phase-2-3b
        run: |
          schema_file="$RUNNER_TEMP/phase-2-3b-public-schema.sql"
          npx --yes supabase@latest db dump \
            --linked \
            --schema public \
            --file "$schema_file" \
            --password "$SUPABASE_DB_PASSWORD"
          test -s "$schema_file"
          grep -q 'get_agilecert_material_admin_console' "$schema_file"
          grep -q 'set_agilecert_material_version_status' "$schema_file"
          grep -q 'reconcile_agilecert_material_entitlements' "$schema_file"
          grep -q 'agilecert_material_versions_one_published' "$schema_file"
          grep -q 'agilecert_material_versions_storage_object_unique' "$schema_file"

      - name: Upload sanitized deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-2-3b-database-deployment-evidence
          path: |
            ${{ runner.temp }}/phase-2-3b-dry-run.log
            ${{ runner.temp }}/phase-2-3b-migration-history.log
            ${{ runner.temp }}/phase-2-3b-public-schema.sql
          if-no-files-found: warn
          retention-days: 3
