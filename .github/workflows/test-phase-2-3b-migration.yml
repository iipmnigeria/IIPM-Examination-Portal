name: Test Phase 2.3B Migration in Scratch Database

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'deployment-triggers/phase-2-3b-scratch-test.txt'

permissions:
  contents: read

jobs:
  migration-test:
    name: Apply and exercise Phase 2.3B SQL
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agilecert_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agilecert_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: agilecert_test
      MIGRATION: supabase/migrations/202607240102_phase_2_3b_material_admin_tools.sql

    steps:
      - name: Checkout Phase 2.3B branch
        uses: actions/checkout@v4
        with:
          ref: phase-2-3b-material-admin-tools

      - name: Validate migration input
        run: |
          test -s "$MIGRATION"
          test "$(git rev-parse --abbrev-ref HEAD)" = 'phase-2-3b-material-admin-tools'

      - name: Prepare compatible Phase 2.3A baseline
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/baseline.sql" <<'SQL'
          create extension if not exists pgcrypto;

          do $$
          begin
            if not exists (select 1 from pg_roles where rolname = 'anon') then create role anon; end if;
            if not exists (select 1 from pg_roles where rolname = 'authenticated') then create role authenticated; end if;
            if not exists (select 1 from pg_roles where rolname = 'service_role') then create role service_role; end if;
          end;
          $$;

          create schema if not exists auth;
          create or replace function auth.uid()
          returns uuid
          language sql
          stable
          as $$
            select nullif(current_setting('app.test_uid', true), '')::uuid
          $$;

          create table public.profiles (
            id uuid primary key,
            role text not null,
            is_active boolean not null default true
          );

          create table public.programmes (
            id uuid primary key default gen_random_uuid(),
            code text not null,
            name text not null,
            is_active boolean not null default true
          );

          create table public.examinations (
            id uuid primary key default gen_random_uuid(),
            programme_id uuid not null references public.programmes(id),
            title text not null,
            status text not null default 'published',
            requires_payment boolean not null default true
          );

          create table public.exam_assignments (
            id uuid primary key default gen_random_uuid(),
            examination_id uuid not null references public.examinations(id),
            candidate_id uuid not null,
            assigned_by uuid,
            available_from timestamptz,
            expires_at timestamptz,
            status text not null default 'assigned'
          );

          create table public.agilecert_preparation_materials (
            id uuid primary key default gen_random_uuid(),
            title text not null,
            description text,
            material_type text not null default 'study_guide',
            status text not null default 'draft',
            created_by uuid,
            created_at timestamptz not null default now(),
            updated_at timestamptz not null default now()
          );

          create table public.agilecert_preparation_material_versions (
            id uuid primary key default gen_random_uuid(),
            material_id uuid not null references public.agilecert_preparation_materials(id) on delete cascade,
            version_number integer not null,
            version_label text,
            storage_bucket text not null,
            storage_path text not null,
            file_name text not null,
            mime_type text not null,
            size_bytes bigint not null default 0,
            checksum_sha256 text,
            status text not null default 'draft',
            published_at timestamptz,
            created_by uuid,
            created_at timestamptz not null default now(),
            updated_at timestamptz not null default now()
          );

          create table public.agilecert_exam_materials (
            examination_id uuid not null references public.examinations(id) on delete cascade,
            material_id uuid not null references public.agilecert_preparation_materials(id) on delete cascade,
            position integer not null default 1,
            is_required boolean not null default false,
            available_from timestamptz,
            expires_at timestamptz,
            is_active boolean not null default true,
            created_by uuid,
            created_at timestamptz not null default now(),
            updated_at timestamptz not null default now(),
            primary key (examination_id, material_id)
          );

          create table public.agilecert_material_entitlements (
            id uuid primary key default gen_random_uuid(),
            candidate_id uuid not null,
            examination_id uuid not null,
            material_id uuid not null,
            source_type text not null,
            source_order_id uuid,
            source_assignment_id uuid not null,
            status text not null default 'active',
            available_from timestamptz not null default now(),
            expires_at timestamptz,
            granted_at timestamptz not null default now(),
            revoked_at timestamptz,
            metadata jsonb not null default '{}'::jsonb,
            created_at timestamptz not null default now(),
            updated_at timestamptz not null default now()
          );

          create or replace function public.refresh_agilecert_material_entitlements(uuid, uuid)
          returns void language plpgsql security definer as $$ begin return; end; $$;

          create or replace function public.agilecert_test_trigger_stub()
          returns trigger language plpgsql security definer as $$
          begin
            if tg_op = 'DELETE' then return old; end if;
            return new;
          end;
          $$;

          create or replace function public.agilecert_refresh_materials_after_assignment()
          returns trigger language plpgsql security definer as $$ begin if tg_op = 'DELETE' then return old; end if; return new; end; $$;
          create or replace function public.agilecert_refresh_materials_after_order()
          returns trigger language plpgsql security definer as $$ begin if tg_op = 'DELETE' then return old; end if; return new; end; $$;
          create or replace function public.agilecert_refresh_materials_after_payment()
          returns trigger language plpgsql security definer as $$ begin if tg_op = 'DELETE' then return old; end if; return new; end; $$;
          create or replace function public.agilecert_refresh_materials_after_material()
          returns trigger language plpgsql security definer as $$ begin if tg_op = 'DELETE' then return old; end if; return new; end; $$;
          create or replace function public.agilecert_refresh_materials_after_mapping()
          returns trigger language plpgsql security definer as $$ begin if tg_op = 'DELETE' then return old; end if; return new; end; $$;
          create or replace function public.agilecert_refresh_materials_after_version()
          returns trigger language plpgsql security definer as $$ begin if tg_op = 'DELETE' then return old; end if; return new; end; $$;
          SQL

          psql --set ON_ERROR_STOP=1 --file "$RUNNER_TEMP/baseline.sql"

      - name: Apply Phase 2.3B migration
        run: |
          psql --set ON_ERROR_STOP=1 --file "$MIGRATION" | tee "$RUNNER_TEMP/phase-2-3b-migration-apply.log"

      - name: Exercise administrator publication workflow
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/behaviour.sql" <<'SQL'
          set app.test_uid = '11111111-1111-1111-1111-111111111111';

          insert into public.profiles (id, role, is_active)
          values ('11111111-1111-1111-1111-111111111111', 'exam_admin', true);

          insert into public.programmes (id, code, name)
          values ('22222222-2222-2222-2222-222222222222', 'TEST', 'Test Programme');

          insert into public.examinations (id, programme_id, title)
          values (
            '33333333-3333-3333-3333-333333333333',
            '22222222-2222-2222-2222-222222222222',
            'Test Examination'
          );

          insert into public.agilecert_preparation_materials (
            id, title, description, material_type, status
          ) values (
            '44444444-4444-4444-4444-444444444444',
            'Test Study Guide',
            'Scratch migration test',
            'study_guide',
            'draft'
          );

          insert into public.agilecert_preparation_material_versions (
            id, material_id, version_number, version_label,
            storage_bucket, storage_path, file_name, mime_type, size_bytes, status
          ) values
          (
            '55555555-5555-5555-5555-555555555555',
            '44444444-4444-4444-4444-444444444444',
            1,
            'Version 1',
            'private-materials',
            'test/version-1.pdf',
            'version-1.pdf',
            'application/pdf',
            100,
            'draft'
          ),
          (
            '66666666-6666-6666-6666-666666666666',
            '44444444-4444-4444-4444-444444444444',
            2,
            'Version 2',
            'private-materials',
            'test/version-2.pdf',
            'version-2.pdf',
            'application/pdf',
            120,
            'draft'
          );

          select public.set_agilecert_material_version_status(
            '55555555-5555-5555-5555-555555555555', 'published'
          );
          select public.set_agilecert_material_version_status(
            '66666666-6666-6666-6666-666666666666', 'published'
          );

          do $$
          begin
            if (select count(*) from public.agilecert_preparation_material_versions
                where material_id = '44444444-4444-4444-4444-444444444444'
                  and status = 'published') <> 1 then
              raise exception 'Exactly one version must remain published.';
            end if;
            if (select status from public.agilecert_preparation_material_versions
                where id = '55555555-5555-5555-5555-555555555555') <> 'retired' then
              raise exception 'The prior published version was not retired.';
            end if;
            if (select status from public.agilecert_preparation_materials
                where id = '44444444-4444-4444-4444-444444444444') <> 'published' then
              raise exception 'The logical material was not published.';
            end if;
          end;
          $$;

          insert into public.agilecert_exam_materials (
            examination_id, material_id, position, is_required, is_active
          ) values (
            '33333333-3333-3333-3333-333333333333',
            '44444444-4444-4444-4444-444444444444',
            1,
            true,
            true
          );

          insert into public.exam_assignments (
            examination_id, candidate_id, assigned_by
          ) values (
            '33333333-3333-3333-3333-333333333333',
            '77777777-7777-7777-7777-777777777777',
            '11111111-1111-1111-1111-111111111111'
          );

          select public.get_agilecert_material_admin_console();
          select public.reconcile_agilecert_material_entitlements(
            '33333333-3333-3333-3333-333333333333'
          );
          SQL

          psql --set ON_ERROR_STOP=1 --file "$RUNNER_TEMP/behaviour.sql" | tee "$RUNNER_TEMP/phase-2-3b-behaviour.log"

      - name: Upload scratch database evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-2-3b-scratch-database-test
          path: |
            ${{ runner.temp }}/phase-2-3b-migration-apply.log
            ${{ runner.temp }}/phase-2-3b-behaviour.log
          if-no-files-found: warn
          retention-days: 3
