name: Validate AgileCert Phase 2

on:
  push:
    branches:
      - phase-2-candidate-profile-materials
      - phase-2-2-profile-photo
      - phase-2-2b-profile-avatar-integration
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.*'
      - 'docs/AGILECERT_PHASE_2_SCOPE.md'
      - '.github/workflows/validate-agilecert-phase-2.yml'
  pull_request:
    branches:
      - supabase-integration
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.*'
      - 'docs/AGILECERT_PHASE_2_SCOPE.md'
      - '.github/workflows/validate-agilecert-phase-2.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-agilecert-phase-2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Phase 2 TypeScript, build and scope controls
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Phase 2 branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: TypeScript validation
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Verify AgileCert browser output
        shell: bash
        run: |
          test -s dist/index.html
          grep -q 'AgileCert Global' dist/index.html
          grep -q 'root' dist/index.html

      - name: Confirm Phase 2.2B has no backend changes
        shell: bash
        run: |
          changed_backend="$(git diff --name-only origin/supabase-integration...HEAD | grep -E '^supabase/(migrations|functions)/' || true)"
          if [ -n "$changed_backend" ]; then
            echo "$changed_backend"
            echo 'Phase 2.2B must not add or modify migrations or Edge Functions.'
            exit 1
          fi

      - name: Confirm profile-page and header-avatar integration
        shell: bash
        run: |
          avatar='src/components/CandidateAvatar.tsx'
          editor='src/components/CandidateProfilePhotoEditor.tsx'
          app='src/App.tsx'
          main='src/main.tsx'
          service='src/services/candidateProfilePhotoService.ts'

          test -s "$avatar"
          test -s "$editor"
          test -s "$service"
          test ! -e 'src/components/CandidateProfilePhotoLauncher.tsx'

          grep -q "CandidateAvatar" "$app"
          grep -q "CandidateProfilePhotoEditor" "$app"
          grep -q "Open candidate profile" "$app"
          grep -q "agilecert-profile-photo-refresh" "$avatar"
          grep -q "50 \* 60 \* 1_000" "$avatar"
          grep -q "agilecert-profile-photo-refresh" "$editor"
          grep -q "not identity-verification evidence" "$editor"
          grep -q "createSignedUrl" "$service"
          grep -q "3 \* 1024 \* 1024" "$service"

          if grep -q "CandidateProfilePhotoLauncher" "$main"; then
            echo 'The temporary floating photo launcher is still mounted.'
            exit 1
          fi

          if grep -R -Eqi 'getPublicUrl|service_role|SUPABASE_SERVICE_ROLE' "$avatar" "$editor" "$service"; then
            echo 'Profile photos must not use public URLs or privileged frontend credentials.'
            exit 1
          fi

      - name: Confirm later phases remain excluded
        shell: bash
        run: |
          changed_files="$(git diff --name-only origin/supabase-integration...HEAD)"
          if printf '%s\n' "$changed_files" | grep -Eqi '(credential|certificate-order|identity-verification|ai-adviser|preparation-material)'; then
            echo "$changed_files"
            echo 'A later-phase feature file was introduced in Phase 2.2B.'
            exit 1
          fi

      - name: Confirm Phase 2.2B scope document
        shell: bash
        run: |
          grep -q 'Phase 2.2A — Private candidate profile photo — completed and deployed' docs/AGILECERT_PHASE_2_SCOPE.md
          grep -q 'Phase 2.2B — Profile-page and header-avatar integration — current build unit' docs/AGILECERT_PHASE_2_SCOPE.md
          grep -q 'No database migration or storage-policy change' docs/AGILECERT_PHASE_2_SCOPE.md
          grep -q 'Phase 2.3 — Preparation-material records and entitlements — next increment' docs/AGILECERT_PHASE_2_SCOPE.md
