name: Dry Run Phase 2.3B Database Migration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'deployment-triggers/phase-2-3b-dry-run.txt'

permissions:
  contents: read

concurrency:
  group: phase-2-3b-database-dry-run
  cancel-in-progress: true

jobs:
  dry-run-migration:
    name: Verify Phase 2.3B production migration plan
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: cfecicvugfrrhcvhduzc
      MIGRATION_VERSION: '202607240102'
      MIGRATION_FILE: '202607240102_phase_2_3b_material_admin_tools.sql'
      SUPABASE_WORKDIR: /tmp/agilecert-phase-2-3b-dry-run
    steps:
      - name: Checkout Phase 2.3B branch
        uses: actions/checkout@v4
        with:
          ref: phase-2-3b-material-admin-tools
          fetch-depth: 0

      - name: Validate dry-run inputs
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -s "supabase/migrations/$MIGRATION_FILE"
          changed="$(git diff --name-only origin/supabase-integration...HEAD | grep -E '^supabase/migrations/' || true)"
          test "$changed" = "supabase/migrations/$MIGRATION_FILE"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Prepare deployed Phase 2 history workspace
        shell: bash
        run: |
          rm -rf "$SUPABASE_WORKDIR"
          mkdir -p "$SUPABASE_WORKDIR/supabase/migrations"
          cp supabase/config.toml "$SUPABASE_WORKDIR/supabase/config.toml"
          cp supabase/migrations/202607230101_phase_2_candidate_profile_foundation.sql "$SUPABASE_WORKDIR/supabase/migrations/"
          cp supabase/migrations/202607230102_phase_2_candidate_profile_photo.sql "$SUPABASE_WORKDIR/supabase/migrations/"
          cp supabase/migrations/202607240101_phase_2_3a_preparation_material_entitlements.sql "$SUPABASE_WORKDIR/supabase/migrations/"
          cp "supabase/migrations/$MIGRATION_FILE" "$SUPABASE_WORKDIR/supabase/migrations/"
          test "$(find "$SUPABASE_WORKDIR/supabase/migrations" -maxdepth 1 -type f | wc -l)" -eq 4

      - name: Link production Supabase project
        shell: bash
        working-directory: /tmp/agilecert-phase-2-3b-dry-run
        run: |
          npx --yes supabase@latest link \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Dry run approved migration only
        shell: bash
        working-directory: /tmp/agilecert-phase-2-3b-dry-run
        run: |
          set +e
          dry_run_output="$(npx --yes supabase@latest db push \
            --linked \
            --password "$SUPABASE_DB_PASSWORD" \
            --dry-run 2>&1)"
          dry_run_status=$?
          set -e

          printf '%s\n' "$dry_run_output" | tee "$RUNNER_TEMP/phase-2-3b-dry-run.log"
          test "$dry_run_status" -eq 0

          pending_files="$(printf '%s\n' "$dry_run_output" | grep -Eo '20[0-9]{10,12}_[A-Za-z0-9_.-]+\.sql' | sort -u || true)"
          echo 'Pending migration files detected:'
          printf '%s\n' "$pending_files"
          test "$pending_files" = "$MIGRATION_FILE"

          if printf '%s\n' "$dry_run_output" | grep -Eqi 'up to date|no pending migrations'; then
            echo 'The approved Phase 2.3B migration was not reported as pending.'
            exit 1
          fi

      - name: Verify migration remains unapplied
        shell: bash
        working-directory: /tmp/agilecert-phase-2-3b-dry-run
        run: |
          history_file="$RUNNER_TEMP/phase-2-3b-migration-history.log"
          npx --yes supabase@latest migration list \
            --linked \
            --password "$SUPABASE_DB_PASSWORD" 2>&1 | tee "$history_file"

          python - "$history_file" "$MIGRATION_VERSION" <<'PY'
          from pathlib import Path
          import re
          import sys

          history = Path(sys.argv[1]).read_text()
          version = sys.argv[2]
          matched = None
          for raw_line in history.splitlines():
              line = raw_line.replace('`', '')
              if '|' not in line or version not in line:
                  continue
              parts = [part.strip() for part in line.split('|')]
              if len(parts) >= 3:
                  matched = parts
                  break

          if not matched:
              raise SystemExit(f'Migration {version} is missing from local history output.')
          if matched[0] != version:
              raise SystemExit(f'Migration {version} is not present in the local column: {matched}')
          if matched[1] == version:
              raise SystemExit(f'Migration {version} is already recorded remotely: {matched}')
          PY

      - name: Upload dry-run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-2-3b-database-dry-run
          path: |
            ${{ runner.temp }}/phase-2-3b-dry-run.log
            ${{ runner.temp }}/phase-2-3b-migration-history.log
          if-no-files-found: warn
          retention-days: 3
