name: Deploy Supabase Payment Functions

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-supabase-payment-functions.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-payment-functions
  cancel-in-progress: true

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: cfecicvugfrrhcvhduzc

    steps:
      - name: Checkout payment integration branch
        uses: actions/checkout@v6
        with:
          ref: supabase-integration

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate deployment secret
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN repository secret is not configured."
            exit 1
          fi

      - name: Deploy initialize payment function
        run: npx --yes supabase@latest functions deploy initialize-exam-payment --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy verification function
        run: npx --yes supabase@latest functions deploy verify-exam-payment --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy webhook router
        run: npx --yes supabase@latest functions deploy paystack-webhook --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
