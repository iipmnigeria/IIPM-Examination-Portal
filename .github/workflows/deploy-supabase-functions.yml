name: Deploy Supabase Payment Functions

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: cfecicvugfrrhcvhduzc

    steps:
      - name: Checkout payment integration branch
        uses: actions/checkout@v6
        with:
          ref: supabase-integration

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate deployment secret
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN repository secret is not configured."
            exit 1
          fi

      - name: Deploy Paystack Edge Functions
        run: npx --yes supabase@latest functions deploy --project-ref "$SUPABASE_PROJECT_REF"
