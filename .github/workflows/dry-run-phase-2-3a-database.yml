name: Dry Run Phase 2.3A Database Migration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'deployment-triggers/phase-2-3a-dry-run.txt'

permissions:
  contents: read

concurrency:
  group: phase-2-3a-database-dry-run
  cancel-in-progress: true

jobs:
  dry-run-migration:
    name: Verify Phase 2.3A production migration plan
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: cfecicvugfrrhcvhduzc
      MIGRATION_VERSION: '202607240101'
      MIGRATION_FILE: '202607240101_phase_2_3a_preparation_material_entitlements.sql'
    steps:
      - name: Checkout Phase 2.3A branch
        uses: actions/checkout@v4
        with:
          ref: phase-2-3a-material-entitlements
          fetch-depth: 0

      - name: Validate dry-run inputs
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -s "supabase/migrations/$MIGRATION_FILE"
          test "$(git diff --name-only origin/supabase-integration...HEAD | grep -E '^supabase/migrations/' | wc -l)" -eq 1
          test "$(git diff --name-only origin/supabase-integration...HEAD | grep -E '^supabase/migrations/' | sed 's#supabase/migrations/##')" = "$MIGRATION_FILE"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Link production Supabase project
        shell: bash
        run: |
          npx --yes supabase@latest link \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Dry run approved migration only
        shell: bash
        run: |
          set +e
          dry_run_output="$(npx --yes supabase@latest db push \
            --linked \
            --password "$SUPABASE_DB_PASSWORD" \
            --dry-run 2>&1)"
          dry_run_status=$?
          set -e

          printf '%s\n' "$dry_run_output" | tee "$RUNNER_TEMP/phase-2-3a-dry-run.log"
          test "$dry_run_status" -eq 0

          pending_files="$(printf '%s\n' "$dry_run_output" | grep -Eo '20[0-9]{10,12}_[A-Za-z0-9_.-]+\.sql' | sort -u || true)"
          echo 'Pending migration files detected:'
          printf '%s\n' "$pending_files"
          test "$pending_files" = "$MIGRATION_FILE"

          if printf '%s\n' "$dry_run_output" | grep -Eqi 'up to date|no pending migrations'; then
            echo 'The approved Phase 2.3A migration was not reported as pending.'
            exit 1
          fi

      - name: Verify migration has not been applied
        shell: bash
        run: |
          migration_list="$(npx --yes supabase@latest migration list \
            --linked \
            --password "$SUPABASE_DB_PASSWORD" 2>&1)"
          printf '%s\n' "$migration_list" | tee "$RUNNER_TEMP/phase-2-3a-migration-history.log"

          matching_line="$(printf '%s\n' "$migration_list" | grep "$MIGRATION_VERSION" || true)"
          test -n "$matching_line"
          local_count="$(printf '%s\n' "$matching_line" | grep -o "$MIGRATION_VERSION" | wc -l)"
          test "$local_count" -eq 1

      - name: Upload dry-run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-2-3a-database-dry-run
          path: |
            ${{ runner.temp }}/phase-2-3a-dry-run.log
            ${{ runner.temp }}/phase-2-3a-migration-history.log
          if-no-files-found: warn
          retention-days: 3
