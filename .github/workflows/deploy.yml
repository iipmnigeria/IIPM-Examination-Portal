# Production deployment: automatically publish validated supabase-integration changes.
name: Deploy Production Portal

on:
  push:
    branches:
      - supabase-integration
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production branch
        uses: actions/checkout@v6
        with:
          ref: supabase-integration

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate TypeScript
        run: npm run lint

      - name: Build GitHub Pages portal
        run: npx vite build

      - name: Validate non-blank AgileCert production artifact
        shell: bash
        run: |
          set -euo pipefail
          test -s dist/index.html
          test "$(wc -c < dist/index.html)" -gt 1000
          grep -q 'id="root"' dist/index.html
          grep -q 'iipm-boot-shell' dist/index.html
          grep -q 'AgileCert Global' dist/index.html
          grep -q 'Powered by IIPM' dist/index.html

          asset="$(grep -Eo 'src="[^"]+\.js"' dist/index.html | head -n 1 | cut -d'"' -f2)"
          test -n "$asset"
          test -s "dist/${asset#./}"
          test "$(wc -c < "dist/${asset#./}")" -gt 1000

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live:
    name: Verify published portal is non-blank
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 15
    env:
      LIVE_URL: https://iipmnigeria.github.io/IIPM-Examination-Portal/
    steps:
      - name: Wait for published AgileCert HTML
        shell: bash
        run: |
          set -euo pipefail
          html="$RUNNER_TEMP/live-index.html"
          success=0

          for attempt in $(seq 1 24); do
            cache_busted_url="${LIVE_URL}?deployment=${GITHUB_SHA}&attempt=${attempt}"
            status="$(curl -L --silent --show-error --max-time 30 -o "$html" -w '%{http_code}' "$cache_busted_url" || true)"
            bytes="$(wc -c < "$html" 2>/dev/null || echo 0)"

            if [ "$status" = "200" ] \
              && [ "$bytes" -gt 1000 ] \
              && grep -q 'AgileCert Global' "$html" \
              && grep -q 'iipm-boot-shell' "$html"; then
              success=1
              break
            fi

            echo "Published portal is not ready yet (attempt ${attempt}, HTTP ${status}, ${bytes} bytes)."
            sleep 10
          done

          test "$success" = "1"
          echo "Published HTML is available and contains the permanent non-blank AgileCert boot shell."

      - name: Verify published JavaScript application asset
        shell: bash
        run: |
          set -euo pipefail
          html="$RUNNER_TEMP/live-index.html"
          asset="$(grep -Eo 'src="[^"]+\.js"' "$html" | head -n 1 | cut -d'"' -f2)"
          test -n "$asset"

          asset_url="$(python - "$LIVE_URL" "$asset" <<'PY'
          from urllib.parse import urljoin
          import sys
          print(urljoin(sys.argv[1], sys.argv[2]))
          PY
          )"

          echo "Checking published application asset: $asset_url"
          curl -L --fail --silent --show-error --max-time 60 "$asset_url" -o "$RUNNER_TEMP/live-app.js"
          test "$(wc -c < "$RUNNER_TEMP/live-app.js")" -gt 1000

      - name: Install browser smoke-test dependencies
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/live-smoke"
          cd "$RUNNER_TEMP/live-smoke"
          npm init -y >/dev/null 2>&1
          npm install --no-audit --no-fund playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Confirm the browser renders a non-blank portal
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/live-smoke"

          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import { chromium } from 'playwright';

          const liveUrl = `${process.env.LIVE_URL}?browser-smoke=${process.env.GITHUB_RUN_ID}`;
          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
          const pageErrors = [];
          const consoleErrors = [];

          page.on('pageerror', (error) => pageErrors.push(String(error)));
          page.on('console', (message) => {
            if (message.type() === 'error') consoleErrors.push(message.text());
          });

          const response = await page.goto(liveUrl, {
            waitUntil: 'domcontentloaded',
            timeout: 60000,
          });
          await page.waitForTimeout(6000);

          const status = response?.status() ?? 0;
          const title = await page.title();
          const bodyText = (await page.locator('body').innerText()).trim();
          const rootText = (await page.locator('#root').innerText().catch(() => '')).trim();
          const bootShellVisible = await page
            .locator('#iipm-boot-shell')
            .isVisible()
            .catch(() => false);

          const report = {
            liveUrl,
            status,
            title,
            bodyLength: bodyText.length,
            rootLength: rootText.length,
            bootShellVisible,
            bodyPreview: bodyText.slice(0, 500),
            pageErrors,
            consoleErrors,
          };

          fs.writeFileSync(
            `${process.env.RUNNER_TEMP}/live-portal-report.json`,
            JSON.stringify(report, null, 2),
          );
          await page.screenshot({
            path: `${process.env.RUNNER_TEMP}/live-portal.png`,
            fullPage: true,
          });
          await browser.close();

          if (status < 200 || status >= 400) {
            throw new Error(`Live portal returned HTTP ${status}.`);
          }
          if (!title.includes('AgileCert Global')) {
            throw new Error(`Unexpected live title: ${title}`);
          }
          if (bodyText.length < 100 || !bodyText.includes('AgileCert Global')) {
            throw new Error('The live portal rendered a blank or incomplete page.');
          }
          if (rootText.length < 40 && !bootShellVisible) {
            throw new Error('Neither the application nor the permanent boot shell is visible.');
          }
          NODE

      - name: Upload live smoke-test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-agilecert-portal-smoke-test
          path: |
            ${{ runner.temp }}/live-portal-report.json
            ${{ runner.temp }}/live-portal.png
            ${{ runner.temp }}/live-index.html
          if-no-files-found: warn
          retention-days: 14
