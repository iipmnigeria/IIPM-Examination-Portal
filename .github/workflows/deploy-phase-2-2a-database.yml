# One-purpose production deployment for the approved Phase 2.2A migration.
name: Deploy Phase 2.2A Candidate Profile Photo Database

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'deployment-triggers/phase-2-2a-database.txt'

permissions:
  contents: read

concurrency:
  group: phase-2-2a-database-production
  cancel-in-progress: false

jobs:
  deploy-profile-photo-migration:
    name: Apply private candidate profile photo storage
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: cfecicvugfrrhcvhduzc
      MIGRATION_VERSION: '202607230102'
      MIGRATION_FILE: supabase/migrations/202607230102_phase_2_candidate_profile_photo.sql

    steps:
      - name: Checkout approved production branch
        uses: actions/checkout@v6
        with:
          ref: supabase-integration

      - name: Validate production deployment inputs
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo 'SUPABASE_ACCESS_TOKEN repository secret is not configured.'
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo 'SUPABASE_DB_PASSWORD repository secret is not configured.'
            exit 1
          fi
          test -s "$MIGRATION_FILE"
          grep -q "candidate-profile-photos" "$MIGRATION_FILE"
          test "$MIGRATION_VERSION" = '202607230102'
          unexpected_later="$(find supabase/migrations -maxdepth 1 -type f -name '20*.sql' -printf '%f\n' | cut -d_ -f1 | awk -v approved="$MIGRATION_VERSION" '$1 > approved')"
          test -z "$unexpected_later"

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Link reviewed migration directory to production Supabase
        shell: bash
        run: |
          npx --yes supabase@latest link \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Preview and apply exactly Phase 2.2A
        shell: bash
        run: |
          set +e
          dry_run_output="$(npx --yes supabase@latest db push --linked --password "$SUPABASE_DB_PASSWORD" --dry-run 2>&1)"
          dry_run_status=$?
          set -e
          printf '%s\n' "$dry_run_output"

          if [ "$dry_run_status" -ne 0 ]; then
            echo "Supabase dry run exited with status $dry_run_status. No migration was applied."
            exit "$dry_run_status"
          fi

          if printf '%s\n' "$dry_run_output" | grep -Eqi 'up to date|no pending migrations'; then
            echo 'Phase 2.2A migration is already applied; no database change is required.'
          else
            pending_versions="$(printf '%s\n' "$dry_run_output" | grep -Eo '20[0-9]{10,12}' | sort -u || true)"
            echo "Pending migration versions detected:"
            printf '%s\n' "$pending_versions"
            test "$pending_versions" = "$MIGRATION_VERSION"
            printf 'Y\n' | npx --yes supabase@latest db push --linked --password "$SUPABASE_DB_PASSWORD"
          fi

      - name: Verify remote migration history
        shell: bash
        run: |
          migration_list="$(npx --yes supabase@latest migration list --linked --password "$SUPABASE_DB_PASSWORD" 2>&1)"
          printf '%s\n' "$migration_list"
          printf '%s\n' "$migration_list" | grep -q "$MIGRATION_VERSION"
