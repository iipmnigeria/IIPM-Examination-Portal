# Recovery revision: 2026-07-21.3 — TypeScript-safe browser startup diagnostics
name: Recover IIPM Examination Portal

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/portal-recovery.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout recovered Supabase portal
        uses: actions/checkout@v6
        with:
          ref: supabase-integration

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate TypeScript
        run: npm run lint

      - name: Build production portal
        run: npx vite build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy recovered portal
        id: deployment
        uses: actions/deploy-pages@v4
