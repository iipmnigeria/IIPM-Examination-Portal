name: Apply Phase 2.3A Migration Patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'deployment-triggers/phase-2-3a-migration-patch.txt'

permissions:
  contents: write

jobs:
  patch-phase-2-3a:
    name: Apply reviewed migration safety correction
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Phase 2.3A branch
        uses: actions/checkout@v4
        with:
          ref: phase-2-3a-material-entitlements
          fetch-depth: 0

      - name: Apply reviewed patch
        run: python scripts/patch_phase_2_3a_migration.py

      - name: Commit corrected migration
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add supabase/migrations/202607240101_phase_2_3a_preparation_material_entitlements.sql
          git commit -m 'Harden Phase 2.3A entitlement refresh triggers'
          git push origin HEAD:phase-2-3a-material-entitlements
